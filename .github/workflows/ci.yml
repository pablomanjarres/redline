name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: typecheck + js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  python:
    name: rigor engine (real statistical stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The whole point of this job. `[stats]` must install leidenalg and
      # PyDESeq2, or the engine silently falls back to KMeans and a Welch t and
      # every check quietly measures something else. That fallback hid three real
      # bugs, including Pillar 2 flagging clean analyses, and no test caught it
      # because the dependency was never installed anywhere.
      - name: install the engine with the real stack
        run: pip install -e "services/rigor[stats,dev]"

      - name: assert the real stack is actually importable
        run: |
          python - <<'PY'
          import importlib.util as u, sys
          missing = [m for m in ("scanpy", "leidenalg", "igraph", "pydeseq2", "decoupler") if not u.find_spec(m)]
          if missing:
              sys.exit(f"the [stats] extra did not install: {missing}")
          import scanpy as sc, anndata as ad, numpy as np
          a = ad.AnnData(X=np.random.default_rng(0).normal(size=(40, 5)))
          sc.pp.neighbors(a, use_rep="X", n_neighbors=10)
          sc.tl.leiden(a, resolution=1.0, key_added="k", random_state=0)
          print("leiden ran:", a.obs["k"].nunique(), "clusters")
          PY

      - name: pytest
        working-directory: services/rigor
        run: python -m pytest -q
